<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Octra signer · test</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Consolas', 'monospace'],
        },
      },
    },
  };
</script>
<style>
  .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: rgb(214,211,209); border-radius: 4px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: rgb(168,162,158); }
  @keyframes toast-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes menu-in { from { opacity: 0; transform: translateY(-4px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .anim-toast { animation: toast-in 0.18s ease-out; }
  .anim-menu  { animation: menu-in 0.12s ease-out; }
</style>
</head>
<body class="bg-stone-50 text-stone-900 antialiased text-[13px] leading-relaxed font-sans">

<!-- toasts -->
<div id="toast-stack" class="fixed top-16 right-4 z-50 flex flex-col gap-2 pointer-events-none w-[320px] max-w-[calc(100vw-2rem)]"></div>

<!-- top bar -->
<header class="h-14 bg-white border-b border-stone-200 flex items-center px-3 sm:px-6 gap-2 sm:gap-3 sticky top-0 z-30">
  <div class="flex items-center gap-2 sm:gap-3 mr-auto min-w-0">
    <span class="text-[13px] text-stone-900 truncate">
      <span class="font-semibold">Octra Signer</span>
      <span class="text-stone-400 hidden sm:inline">· demo</span>
    </span>
    <a href="https://github.com/defi-failure/octra-signer-demo" target="_blank" rel="noopener"
      title="View source on GitHub"
      class="flex items-center justify-center h-8 w-8 rounded-full text-stone-500 hover:text-stone-900 hover:bg-stone-100 transition shrink-0">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </div>

  <!-- Network pill (only when connected) -->
  <div id="network-pill-wrap" class="relative hidden">
    <button id="network-pill" type="button" title="Switch network"
      class="flex items-center gap-2 px-2.5 sm:px-3 h-8 rounded-full bg-white border border-stone-200 hover:border-stone-300 transition text-[13px]">
      <span id="network-pill-dot" class="h-1.5 w-1.5 rounded-full bg-stone-400"></span>
      <span id="network-pill-label" class="hidden sm:inline">Network</span>
      <svg width="10" height="10" viewBox="0 0 10 10" class="text-stone-400"><path d="M2 4l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <!-- network menu -->
    <div id="network-menu" class="hidden anim-menu absolute right-0 top-full mt-1 w-[260px] bg-white border border-stone-200 rounded-lg shadow-lg p-1.5 origin-top-right">
      <div class="px-2 py-1.5 text-[10px] uppercase tracking-wider text-stone-400 font-semibold">Networks</div>
      <button data-net="mainnet" class="net-item flex items-center justify-between w-full px-2 py-2 rounded text-[13px] hover:bg-stone-50">
        <span class="flex items-center gap-2"><span class="h-1.5 w-1.5 rounded-full bg-stone-400"></span><span>Mainnet</span></span>
        <span class="font-mono text-[11px] text-stone-400">octrascan.io</span>
      </button>
      <button data-net="devnet" class="net-item flex items-center justify-between w-full px-2 py-2 rounded text-[13px] hover:bg-stone-50">
        <span class="flex items-center gap-2"><span class="h-1.5 w-1.5 rounded-full bg-stone-400"></span><span>Devnet</span></span>
        <span class="font-mono text-[11px] text-stone-400">devnet.octrascan.io</span>
      </button>
    </div>
  </div>

  <!-- Account pill (when connected) -->
  <div id="account-pill-wrap" class="relative hidden">
    <button id="account-pill" type="button" title="Account"
      class="flex items-center gap-2 px-2.5 sm:px-3 h-8 rounded-full bg-white border border-stone-200 hover:border-stone-300 transition text-[13px]">
      <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
      <span id="account-pill-bal" class="font-mono text-stone-900 hidden sm:inline">— OCT</span>
      <span class="text-stone-300 hidden sm:inline">·</span>
      <span id="account-pill-addr" class="font-mono">oct…</span>
      <svg width="10" height="10" viewBox="0 0 10 10" class="text-stone-400"><path d="M2 4l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <!-- account menu -->
    <div id="account-menu" class="hidden anim-menu absolute right-0 top-full mt-1 w-[280px] bg-white border border-stone-200 rounded-lg shadow-lg p-1.5 origin-top-right">
      <div class="px-2 py-1.5 text-[10px] uppercase tracking-wider text-stone-400 font-semibold">Account</div>
      <button onclick="app.copyAddress()" class="flex items-center justify-between w-full px-2 py-2 rounded text-[13px] hover:bg-stone-50">
        <span class="flex items-center gap-2.5">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" class="text-stone-500"><rect x="4" y="4" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 11H3.5C3.22 11 3 10.78 3 10.5V3.5C3 3.22 3.22 3 3.5 3h7c.28 0 .5.22.5.5V4" stroke="currentColor" stroke-width="1.3"/></svg>
          <span>Copy address</span>
        </span>
        <span id="acct-menu-addr" class="font-mono text-[11px] text-stone-400">—</span>
      </button>
      <button onclick="app.refreshBalance()" class="flex items-center justify-between w-full px-2 py-2 rounded text-[13px] hover:bg-stone-50">
        <span class="flex items-center gap-2.5">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" class="text-stone-500"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 5v3l2 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span>Refresh balance</span>
        </span>
        <span id="acct-menu-bal" class="font-mono text-[11px] text-stone-400">—</span>
      </button>
      <div class="my-1 h-px bg-stone-100"></div>
      <button onclick="app.disconnect()" class="flex items-center w-full px-2 py-2 rounded text-[13px] text-rose-600 hover:bg-rose-50">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" class="mr-2.5"><path d="M9.5 11.5l-3 3v-3H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 7l2 1.5L11 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 8.5h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Disconnect
      </button>
    </div>
  </div>

  <!-- Connect button (when disconnected) -->
  <button id="btn-connect" onclick="app.connect()"
    class="px-3 sm:px-4 h-8 rounded-full bg-stone-900 hover:bg-stone-800 text-white text-[13px] font-medium transition whitespace-nowrap">
    <span class="sm:hidden">Connect</span>
    <span class="hidden sm:inline">Connect wallet</span>
  </button>
</header>

<main class="max-w-[1180px] mx-auto px-6 pt-6 pb-[15vh] flex flex-col gap-4">

  <!-- action cards -->
  <div class="flex flex-col gap-3 min-w-0">

    <!-- Configuration -->
    <section class="bg-white border border-stone-200 rounded-md">
      <header class="flex items-center px-4 h-10 border-b border-stone-200 gap-3">
        <h2 class="text-[13px] font-semibold">Configuration</h2>
        <span class="ml-auto font-mono text-[11px] text-stone-400">point at your local webcli</span>
      </header>
      <div class="p-4 flex items-end gap-3 flex-wrap">
        <div class="flex-1 min-w-[240px]">
          <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">Webcli URL</label>
          <input id="cfg-webcli" type="text" placeholder="http://127.0.0.1:8420"
            class="w-full h-9 px-3 border border-stone-300 rounded-md font-mono text-[13px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10">
        </div>
        <button onclick="app.applyWebcli()"
          class="h-9 px-4 rounded-md bg-white border border-stone-300 hover:bg-stone-50 text-stone-700 text-[12px] font-medium transition">
          Apply
        </button>
      </div>
    </section>

    <!-- Send -->
    <section class="bg-white border border-stone-200 rounded-md">
      <header class="flex items-center px-4 h-10 border-b border-stone-200 gap-3">
        <h2 class="text-[13px] font-semibold">Send OCT</h2>
        <span class="ml-auto font-mono text-[11px] text-stone-400">send</span>
      </header>
      <div class="p-4">
        <div class="grid grid-cols-2 gap-x-4 gap-y-3">
          <div class="col-span-2">
            <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">Recipient</label>
            <input id="send-to" type="text" value="octGhJQX7rEccTypEauSVExV6dqtGm3XD4kbAjTxSZwHit9"
              class="w-full h-9 px-3 border border-stone-300 rounded-md font-mono text-[13px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10">
          </div>
          <div>
            <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">Amount (OCT)</label>
            <input id="send-amt" type="text" value="0.001"
              class="w-full h-9 px-3 border border-stone-300 rounded-md font-mono text-[13px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10">
          </div>
          <div>
            <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">
              Message <span class="font-normal normal-case tracking-normal text-stone-400">optional</span>
            </label>
            <input id="send-msg" type="text" value="hello from test app"
              class="w-full h-9 px-3 border border-stone-300 rounded-md text-[13px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10">
          </div>
        </div>
        <div class="mt-4 pt-3 border-t border-stone-100 flex gap-2">
          <button onclick="app.send()" data-needs-conn="1"
            class="h-9 px-4 rounded-md bg-stone-900 hover:bg-stone-800 text-white text-[13px] font-medium transition disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-stone-900">
            Request signature
          </button>
        </div>
      </div>
    </section>

    <!-- Stealth send -->
    <section class="bg-white border border-stone-200 rounded-md">
      <header class="flex items-center px-4 h-10 border-b border-stone-200 gap-3">
        <h2 class="text-[13px] font-semibold">Stealth send</h2>
        <span class="ml-auto font-mono text-[11px] text-stone-400">stealth_send</span>
      </header>
      <div class="p-4">
        <div class="grid grid-cols-2 gap-x-4 gap-y-3">
          <div class="col-span-2">
            <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">Recipient</label>
            <input id="stealth-to" type="text" value="octGhJQX7rEccTypEauSVExV6dqtGm3XD4kbAjTxSZwHit9"
              class="w-full h-9 px-3 border border-stone-300 rounded-md font-mono text-[13px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10">
          </div>
          <div>
            <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">Amount (OCT)</label>
            <input id="stealth-amt" type="text" value="0.001"
              class="w-full h-9 px-3 border border-stone-300 rounded-md font-mono text-[13px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10">
          </div>
        </div>
        <div class="mt-4 pt-3 border-t border-stone-100 flex gap-2">
          <button onclick="app.stealthSend()" data-needs-conn="1"
            class="h-9 px-4 rounded-md bg-stone-900 hover:bg-stone-800 text-white text-[13px] font-medium transition disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-stone-900">
            Request signature
          </button>
        </div>
      </div>
    </section>

    <!-- Contract call -->
    <section class="bg-white border border-stone-200 rounded-md">
      <header class="flex items-center px-4 h-10 border-b border-stone-200 gap-3">
        <h2 class="text-[13px] font-semibold">Contract call</h2>
        <span class="ml-auto font-mono text-[11px] text-stone-400">contract_call</span>
      </header>
      <div class="p-4">
        <div class="grid grid-cols-2 gap-x-4 gap-y-3">
          <div class="col-span-2">
            <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">Contract address</label>
            <input id="call-addr" type="text" placeholder="oct…"
              class="w-full h-9 px-3 border border-stone-300 rounded-md font-mono text-[13px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10">
          </div>
          <div>
            <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">Method</label>
            <input id="call-method" type="text" placeholder="e.g. transfer"
              class="w-full h-9 px-3 border border-stone-300 rounded-md text-[13px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10">
          </div>
          <div>
            <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">OU</label>
            <input id="call-ou" type="text" value="1000"
              class="w-full h-9 px-3 border border-stone-300 rounded-md font-mono text-[13px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10">
          </div>
          <div class="col-span-2">
            <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">
              Params <span class="font-normal normal-case tracking-normal text-stone-400">JSON array</span>
            </label>
            <input id="call-params" type="text" value="[]"
              class="w-full h-9 px-3 border border-stone-300 rounded-md font-mono text-[13px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10">
          </div>
        </div>
        <div class="mt-4 pt-3 border-t border-stone-100 flex gap-2">
          <button onclick="app.contractCall()" data-needs-conn="1"
            class="h-9 px-4 rounded-md bg-stone-900 hover:bg-stone-800 text-white text-[13px] font-medium transition disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-stone-900">
            Request signature
          </button>
        </div>
      </div>
    </section>

    <!-- Balance privacy -->
    <section class="bg-white border border-stone-200 rounded-md">
      <header class="flex items-center px-4 h-10 border-b border-stone-200 gap-3">
        <h2 class="text-[13px] font-semibold">Encryption</h2>
        <span class="ml-auto font-mono text-[11px] text-stone-400">encrypt · decrypt</span>
      </header>
      <div class="p-4">
        <div class="grid grid-cols-2 gap-x-4 gap-y-3">
          <div>
            <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">Amount (OCT)</label>
            <input id="bal-amt" type="text" value="0.1"
              class="w-full h-9 px-3 border border-stone-300 rounded-md font-mono text-[13px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10">
          </div>
        </div>
        <div class="mt-4 pt-3 border-t border-stone-100 flex gap-2">
          <button onclick="app.encrypt()" data-needs-conn="1"
            class="h-9 px-4 rounded-md bg-stone-900 hover:bg-stone-800 text-white text-[13px] font-medium transition disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-stone-900">
            encrypt
          </button>
          <button onclick="app.decrypt()" data-needs-conn="1"
            class="h-9 px-4 rounded-md bg-white border border-stone-300 hover:bg-stone-50 text-stone-700 text-[13px] font-medium transition disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-white">
            decrypt
          </button>
        </div>
      </div>
    </section>

    <!-- FHE -->
    <section class="bg-white border border-stone-200 rounded-md">
      <header class="flex items-center px-4 h-10 border-b border-stone-200 gap-3">
        <h2 class="text-[13px] font-semibold">FHE tools</h2>
        <span class="ml-auto font-mono text-[11px] text-stone-400">fhe_encrypt · fhe_decrypt</span>
      </header>
      <div class="p-4">
        <div class="grid grid-cols-2 gap-x-4 gap-y-3">
          <div>
            <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">Integer value</label>
            <input id="fhe-val" type="number" value="42"
              class="w-full h-9 px-3 border border-stone-300 rounded-md font-mono text-[13px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10">
          </div>
          <div></div>
          <div class="col-span-2">
            <label class="block text-[10.5px] uppercase tracking-wider text-stone-500 font-semibold mb-1">
              Ciphertext <span class="font-normal normal-case tracking-normal text-stone-400">base64</span>
            </label>
            <textarea id="fhe-cipher" rows="2" placeholder="paste a prior result…"
              class="w-full px-3 py-2 border border-stone-300 rounded-md font-mono text-[12px] resize-y min-h-[60px] focus:outline-none focus:border-stone-900 focus:ring-2 focus:ring-stone-900/10"></textarea>
          </div>
        </div>
        <div class="mt-4 pt-3 border-t border-stone-100 flex gap-2">
          <button onclick="app.fheEncrypt()" data-needs-conn="1"
            class="h-9 px-4 rounded-md bg-stone-900 hover:bg-stone-800 text-white text-[13px] font-medium transition disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-stone-900">
            encrypt
          </button>
          <button onclick="app.fheDecrypt()" data-needs-conn="1"
            class="h-9 px-4 rounded-md bg-white border border-stone-300 hover:bg-stone-50 text-stone-700 text-[13px] font-medium transition disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-white">
            decrypt
          </button>
        </div>
      </div>
    </section>

  </div>

  <!-- Activity / Transactions (bottom panel) -->
  <section class="bg-white border border-stone-200 rounded-md">
    <div class="flex items-center border-b border-stone-200">
      <button id="tab-log" onclick="app.showTab('log')"
        class="h-10 px-5 text-[12px] font-semibold text-stone-900 bg-stone-50 shadow-[inset_0_-2px_0_theme(colors.stone.900)]">
        Activity
      </button>
      <button id="tab-tx" onclick="app.showTab('tx')"
        class="h-10 px-5 text-[12px] font-medium text-stone-500 hover:text-stone-900 border-l border-stone-200">
        Transactions
        <span id="tx-count" class="ml-1 px-1.5 py-0.5 rounded-full bg-stone-100 text-stone-500 text-[10px] font-mono font-semibold">0</span>
      </button>
      <span class="ml-auto pr-3">
        <button onclick="app.clearActiveTab()" class="text-[11.5px] text-stone-500 hover:text-stone-900 px-2.5 py-1 rounded transition">
          Clear
        </button>
      </span>
    </div>
    <div id="pane-log" class="scrollbar-thin h-[640px] overflow-y-auto relative font-mono text-[12px] leading-[1.5]">
      <div id="log"></div>
      <button id="log-jump" onclick="app.jumpToLatest()"
        class="hidden absolute bottom-3 right-4 h-6 px-2.5 rounded-full bg-stone-900 hover:bg-stone-800 text-white text-[10.5px] font-semibold shadow-md transition">
        new ↓
      </button>
    </div>
    <div id="pane-tx" class="scrollbar-thin h-[640px] overflow-y-auto hidden">
      <div id="tx-list"></div>
      <div id="tx-empty" class="px-4 py-12 text-center text-stone-400 italic text-[12px]">
        No transactions yet · approved txs will land here
      </div>
    </div>
  </section>

</main>

<script>
(function() {
  'use strict';

  var DEFAULT_WEBCLI = 'http://127.0.0.1:8420';
  var LOCAL_WEBCLI_ORIGINS = ['http://127.0.0.1:8420', 'http://localhost:8420'];
  var STORAGE_KEY = 'octra_demo_webcli_url';
  var TX_KEY = 'octra_demo_tx_history';
  var TX_MAX = 50;
  var PROTOCOL_VERSION = 1;

  function loadSavedWebcli() {
    try {
      var v = localStorage.getItem(STORAGE_KEY);
      if (v && /^https?:\/\/[^\s/]+/.test(v)) return v.replace(/\/+$/, '');
    } catch (e) {}
    return null;
  }
  var WEBCLI = loadSavedWebcli()
    || (LOCAL_WEBCLI_ORIGINS.indexOf(location.origin) >= 0 ? location.origin : DEFAULT_WEBCLI);
  var POPUP = WEBCLI + '/sign.html';
  var FILE_ORIGIN_BLOCKED = (location.protocol === 'file:');

  var pending = new Map();
  var lastAddr = '';
  var lastBalRaw = null;
  var logEl = document.getElementById('log');
  var paneLogEl = document.getElementById('pane-log');
  var toastEl = document.getElementById('toast-stack');

  // ─── helpers
  function escHtml(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function uuid() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'req-' + Math.random().toString(36).slice(2) + '-' + Date.now();
  }
  function octToRaw(str) {
    var s = String(str == null ? '' : str).trim();
    if (!/^[0-9]+(\.[0-9]{1,6})?$/.test(s)) return null;
    var parts = s.split('.');
    var intPart = parts[0] || '0';
    var fracPart = (parts[1] || '').padEnd(6, '0');
    return (intPart + fracPart).replace(/^0+/, '') || '0';
  }
  function rawToOct(raw) {
    var s = String(raw == null ? '0' : raw).replace(/[^0-9]/g, '');
    if (!s || s === '0') return '0';
    while (s.length <= 6) s = '0' + s;
    var intP = s.slice(0, s.length - 6);
    var fracP = s.slice(-6).replace(/0+$/, '');
    return fracP ? intP + '.' + fracP : intP;
  }
  function fmtAddr(a) {
    if (!a || a.length < 12) return a || '';
    return a.slice(0, 8) + '…' + a.slice(-6);
  }
  function fmtTime(d) { return d.toTimeString().slice(0,8); }
  function isWebcliOrigin(origin) {
    if (origin === WEBCLI) return true;
    return LOCAL_WEBCLI_ORIGINS.indexOf(origin) >= 0;
  }
  function shortJson(v) {
    try { var s = JSON.stringify(v); return s.length > 140 ? s.slice(0, 140) + '…' : s; } catch (e) { return String(v); }
  }
  function networkLabel(rpcUrl) {
    if (!rpcUrl) return '—';
    if (rpcUrl === 'https://octrascan.io/rpc' || rpcUrl === 'http://46.101.86.250:8080') return 'Mainnet';
    if (rpcUrl === 'https://devnet.octrascan.io/rpc' || rpcUrl === 'http://165.227.225.79:8080') return 'Devnet';
    return 'Custom';
  }
  function rpcExplorerFor(rpcUrl) {
    if (!rpcUrl) return 'https://octrascan.io';
    if (rpcUrl.indexOf('devnet') >= 0 || rpcUrl.indexOf('165.227.225.79') >= 0) return 'https://devnet.octrascan.io';
    return 'https://octrascan.io';
  }

  // ─── toast
  function toast(msg, kind, durationMs) {
    var iconMap = { ok: '✓', err: '✕', info: 'i', warn: '!' };
    var leftBorder = { ok: 'border-l-emerald-500', err: 'border-l-rose-500', info: 'border-l-stone-700', warn: 'border-l-amber-500' };
    var icoColor   = { ok: 'text-emerald-600',     err: 'text-rose-600',    info: 'text-stone-700',    warn: 'text-amber-600'   };
    var lb = leftBorder[kind] || leftBorder.info;
    var ic = icoColor[kind]   || icoColor.info;
    var t = document.createElement('div');
    t.className = 'anim-toast pointer-events-auto bg-white border border-stone-200 border-l-[3px] ' + lb + ' rounded-md shadow-md px-3 py-2.5 grid grid-cols-[14px_1fr_14px] gap-2 items-start text-[12.5px] leading-snug transition';
    t.innerHTML =
      '<span class="text-center font-bold leading-none mt-0.5 font-mono ' + ic + '">' + (iconMap[kind] || '·') + '</span>' +
      '<div class="break-words text-stone-700">' + msg + '</div>' +
      '<button class="text-stone-400 hover:text-stone-700 leading-none text-base p-0" aria-label="close">×</button>';
    var dismiss = function() {
      t.style.opacity = '0';
      t.style.transform = 'translateY(-4px)';
      setTimeout(function() { t.remove(); }, 200);
    };
    t.querySelector('button').addEventListener('click', dismiss);
    toastEl.appendChild(t);
    setTimeout(dismiss, durationMs || (kind === 'err' ? 6000 : 3500));
  }

  function log(msg, kind) {
    var t = new Date();
    var line = document.createElement('div');
    var bg = kind === 'ok' ? 'bg-emerald-50' : kind === 'err' ? 'bg-rose-50' : '';
    var mc = kind === 'ok' ? 'text-emerald-600 font-bold' : kind === 'err' ? 'text-rose-600 font-bold' : 'text-stone-400';
    var msgC = kind === 'err' ? 'text-rose-900' : kind === 'ok' ? 'text-emerald-900' : 'text-stone-700';
    line.className = 'grid grid-cols-[56px_16px_1fr] gap-1.5 items-baseline px-3 py-1 border-b border-stone-100 ' + bg;
    var marker = kind === 'err' ? '✕' : kind === 'ok' ? '✓' : '·';
    line.innerHTML =
      '<span class="text-stone-400 text-[10.5px]">' + fmtTime(t) + '</span>' +
      '<span class="text-center ' + mc + '">' + marker + '</span>' +
      '<span class="break-all ' + msgC + '">' + escHtml(msg) + '</span>';

      jb.classList.remove('hidden');

  // ─── tx history
  var txHistory = [];
  function loadTxHistory() {
    try { var raw = localStorage.getItem(TX_KEY); if (raw) txHistory = JSON.parse(raw) || []; } catch (e) { txHistory = []; }
  }
  function saveTxHistory() {
    try { localStorage.setItem(TX_KEY, JSON.stringify(txHistory.slice(0, TX_MAX))); } catch (e) {}
  }
  function recordTx(method, hash, summary, rpcUrl) {
    if (!hash) return;
    txHistory.unshift({
      method: method, hash: hash, summary: summary || '',
      ts: Date.now(), network: networkLabel(rpcUrl || ''),
      explorer: rpcExplorerFor(rpcUrl || ''),
    });
    txHistory = txHistory.slice(0, TX_MAX);
    saveTxHistory();
    renderTxHistory();
    document.getElementById('tx-count').textContent = String(txHistory.length);

  function renderTxHistory() {
    var listEl = document.getElementById('tx-list');
    var emptyEl = document.getElementById('tx-empty');
    if (txHistory.length === 0) { listEl.innerHTML = ''; emptyEl.style.display = 'block'; return; }
    emptyEl.style.display = 'none';
    listEl.innerHTML = txHistory.map(function(x) {
      var d = new Date(x.ts);
      var when = String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' +
                 String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      var url = x.explorer + '/tx.html?hash=' + encodeURIComponent(x.hash);
      var shortHash = x.hash.slice(0, 10) + '…' + x.hash.slice(-6);
      return '<div class="px-3 py-2.5 border-b border-stone-100 last:border-b-0">' +
        '<div class="flex items-baseline justify-between mb-1">' +
          '<span class="font-mono text-[11.5px] font-semibold text-stone-900">' + x.method + '</span>' +
          '<span class="font-mono text-[11px] text-stone-400">' + when + '</span>' +
        '</div>' +
        (x.summary ? '<div class="text-[11.5px] text-stone-600 mb-1">' + escHtml(x.summary) + '</div>' : '') +
        '<div class="flex items-baseline justify-between font-mono text-[11px] text-stone-500">' +
          '<span>' + shortHash + ' · ' + escHtml(x.network) + '</span>' +
          '<a href="' + url + '" target="_blank" rel="noopener" class="text-stone-900 underline-offset-2 hover:underline">explorer ↗</a>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // dApp queries the public chain RPC directly for balance — webcli's /api/balance is same-origin only
  async function fetchBalanceFromChain(rpcUrl, addr) {
    if (!rpcUrl || !addr) return null;
    try {
      var r = await fetch(rpcUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'octra_balance', params: [addr] }),
      });
      if (!r.ok) return null;
      var j = await r.json();
      if (j && j.result && j.result.balance_raw != null) return String(j.result.balance_raw);
      return null;
    } catch (e) { return null; }

  function setBalanceUI(rawStr) {

  async function refreshStatus() {
    var s = await fetchStatus();
    if (s.connected) {
      setConnectedUI(true, s);
      var raw = await fetchBalanceFromChain(s.rpc_url, s.address);
      setBalanceUI(raw);
    } else {
      setConnectedUI(false, s);
    }
  }

  // ─── popup transport
  function buildRequest(entry) {
    return { type: 'request', version: PROTOCOL_VERSION, id: entry.id, method: entry.method, params: entry.params, dapp_name: 'Octra signer test', dapp_url: location.href };
  }
  function clearTimers(entry) {
    if (!entry) return;
    if (entry.pollTimer) clearInterval(entry.pollTimer);
    if (entry.sendTimer) clearInterval(entry.sendTimer);
    if (entry.timeoutTimer) clearTimeout(entry.timeoutTimer);
    entry.pollTimer = entry.sendTimer = entry.timeoutTimer = null;
  }
  function sendRequest(entry) {
    if (!entry || !entry.window || entry.window.closed) return false;
    try {
      entry.sendCount = (entry.sendCount || 0) + 1;
      entry.window.postMessage(buildRequest(entry), WEBCLI);
      entry.sent = true;
      if (entry.sendCount === 1) {
        log('request posted to popup id=' + entry.id + ' method=' + entry.method + ' target=' + WEBCLI, 'info');
      } else if (entry.sendCount === 2 || entry.sendCount % 8 === 0) {
        log('request retry #' + entry.sendCount + ' id=' + entry.id + ' method=' + entry.method, 'info');
      }
      return true;
    } catch (e) {
      log('postMessage failed id=' + entry.id + ' · ' + e.message, 'err');
      return false;
    }
  }
  window.addEventListener('message', function(e) {
    if (!isWebcliOrigin(e.origin)) return;
    var d = e.data;
    if (!d || typeof d !== 'object') return;
    if (d.type === 'ready') {
      log('popup ready from ' + e.origin + ' source=' + (d.source || '?'), 'info');
      for (var entry of pending.values()) if (!entry.sent) sendRequest(entry);
      return;
    }
    if (d.type !== 'response') return;
    var p = pending.get(d.id);
    if (!p) return;
    pending.delete(d.id);
    clearTimers(p);
    var elapsed = p.startedAt ? (Date.now() - p.startedAt) : '?';
    log('popup response id=' + d.id + ' method=' + (d.method || '?') + ' ok=' + (!!d.ok) + ' elapsed=' + elapsed + 'ms', d.ok ? 'ok' : 'err');
    if (d.ok) p.resolve(d.result || {});
    else p.reject(new Error((d.error && (d.error.code + ': ' + d.error.message)) || 'rejected'));
  });
  function requestSign(method, params) {
    return new Promise(function(resolve, reject) {
      if (FILE_ORIGIN_BLOCKED) return reject(new Error('file:// origin not supported'));
      for (var existing of pending.values()) {
        if (existing.window && !existing.window.closed) {
          try { existing.window.focus(); } catch (e) {}
          return reject(new Error('a request is already in progress'));
        }
      }
      var id = uuid();
      var w = window.open(POPUP, 'octra_sign', 'width=500,height=720,resizable=yes,scrollbars=yes');
      if (!w) return reject(new Error('popup blocked — allow popups for this site'));
      log('popup opened id=' + id + ' method=' + method + ' url=' + POPUP, 'info');
      var entry = { id: id, method: method, params: params, window: w, sent: false, sendCount: 0, startedAt: Date.now(), resolve: resolve, reject: reject };
      pending.set(id, entry);
      entry.pollTimer = setInterval(function() {
        if (w.closed && pending.has(id)) {
          pending.delete(id); clearTimers(entry);
          log('popup closed before response id=' + id + ' elapsed=' + (Date.now() - entry.startedAt) + 'ms', 'err');
          reject(new Error('popup closed'));
        }
      }, 400);
      entry.sendTimer = setInterval(function() {
        if (!pending.has(id)) { clearTimers(entry); return; }
        sendRequest(entry);
      }, 250);
      sendRequest(entry);
      entry.timeoutTimer = setTimeout(function() {
        if (pending.has(id)) {
          pending.delete(id); clearTimers(entry);
          try { w.close(); } catch (e) {}
          log('popup timeout id=' + id + ' elapsed=' + (Date.now() - entry.startedAt) + 'ms', 'err');
          reject(new Error('timeout'));
        }
      }, 180000);
    });
  }
  async function run(method, params, describe) {
    log(method + (describe ? ' · ' + describe : ''), 'info');
    try {
      var r = await requestSign(method, params);
      log(method + ' ok · ' + shortJson(r), 'ok');
      var hash = r && (r.tx_hash || r.hash);
      if (hash) {
        var rpcUrl = r.rpc_url || window._lastKnownRpc || '';
        recordTx(method, hash, describe || '', rpcUrl);
        toast('<strong>' + method + '</strong> submitted · <code class="font-mono text-[11px] bg-stone-100 px-1 rounded">' + hash.slice(0,10) + '…</code>', 'ok');
      } else if (method === 'connect') {
        toast('<strong>connected</strong> · <code class="font-mono text-[11px] bg-stone-100 px-1 rounded">' + escHtml(fmtAddr(r.address || '')) + '</code>', 'ok');
      } else if (method === 'switch_network') {
        toast('<strong>network</strong> · switched to ' + (r.rpc_url ? networkLabel(r.rpc_url) : 'ok'), 'ok');
        // immediately reflect new network in pill + force a balance refresh against the new rpc
        if (r.rpc_url) {
          window._lastKnownRpc = r.rpc_url;
          var newLabel = networkLabel(r.rpc_url);
          document.getElementById('network-pill-label').textContent = newLabel;
          var key = newLabel === 'Mainnet' ? 'mainnet' : newLabel === 'Devnet' ? 'devnet' : null;
          setNetItemActive(key);
          setBalanceUI(null);
          var raw = await fetchBalanceFromChain(r.rpc_url, lastAddr);
          setBalanceUI(raw);
        }
      } else if (method === 'fhe_encrypt') {
        toast('<strong>encrypted</strong> · ciphertext copied to field', 'ok');
      } else if (method === 'fhe_decrypt') {
        toast('<strong>decrypted</strong> · value: ' + (r.value != null ? r.value : '(see log)'), 'ok');
      }
      await refreshStatus();
      return r;
    } catch (e) {
      log(method + ' failed · ' + e.message, 'err');
      toast('<strong>' + method + '</strong> failed · ' + escHtml(e.message), 'err');
    }
  }

  // ─── app surface
  var app = {
    applyWebcli: function() {
      var raw = (document.getElementById('cfg-webcli').value || '').trim().replace(/\/+$/, '');
      if (!/^https?:\/\/[^\s/]+/.test(raw)) { logToast('invalid url', 'err'); return; }
      WEBCLI = raw; POPUP = WEBCLI + '/sign.html';
      try { localStorage.setItem(STORAGE_KEY, WEBCLI); } catch (e) {}
      log('webcli url → ' + WEBCLI, 'info');
      toast('Webcli url updated', 'ok');
      refreshStatus();
    },
    connect: async function() {
      var s = await fetchStatus();
      if (s.reason === 'unreachable') { log('webcli unreachable', 'err'); toast('Please install webcli first · <a href="https://github.com/octra-labs/webcli" target="_blank" rel="noopener" class="underline text-stone-900 hover:text-rose-600">github.com/octra-labs/webcli</a>', 'err'); return; }
      if (s.reason === 'file_origin_blocked') { toast('Serve over http:// to use the signer', 'err'); return; }
      run('connect', {}, '');
    },
    disconnect: async function() {
      closeAllMenus();
      log('disconnect', 'info');

        var r = await fetch(WEBCLI + '/api/dapp/disconnect', { method: 'POST', credentials: 'omit', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        var j = await r.json();
        log('disconnect ok · ' + shortJson(j), 'ok');
        toast('Disconnected', 'ok');

      } catch (e) {
        log('disconnect failed · ' + e.message, 'err');

    },
    copyAddress: async function() {
      closeAllMenus();

        toast('Address copied', 'ok', 2000);

        toast('Copy failed · ' + e.message, 'err');

    refreshBalance: async function() {
      closeAllMenus();
      var raw = await fetchBalanceFromChain(window._lastKnownRpc, lastAddr);
      if (raw != null) {
        setBalanceUI(raw);
        toast('Balance · <strong>' + rawToOct(raw) + ' OCT</strong>', 'ok', 2500);

    send: function() {
      var to = document.getElementById('send-to').value.trim();
      var amt = document.getElementById('send-amt').value.trim();
      var msg = document.getElementById('send-msg').value.trim();
      var raw = octToRaw(amt);
      if (!to)  return logToast('missing recipient', 'err');
      if (!raw) return logToast('invalid amount', 'err');
      run('send', { to: to, amount_raw: raw, message: msg }, amt + ' OCT → ' + to.slice(0,10) + '…');
    },
    contractCall: function() {
      var addr = document.getElementById('call-addr').value.trim();
      var method = document.getElementById('call-method').value.trim();
      var rawP = document.getElementById('call-params').value.trim();
      var ou = document.getElementById('call-ou').value.trim() || '1000';
      if (!addr || !method) return logToast('missing contract or method', 'err');
      var params;
      try { params = JSON.parse(rawP); } catch (e) { return logToast('params must be valid JSON array', 'err'); }
      if (!Array.isArray(params)) return logToast('params must be an array', 'err');
      run('contract_call', { address: addr, method: method, params: params, ou: ou }, method + '() @ ' + addr.slice(0,10) + '…');
    },
    stealthSend: function() {
      var to = document.getElementById('stealth-to').value.trim();
      var amt = document.getElementById('stealth-amt').value.trim();
      var raw = octToRaw(amt);
      if (!to || !raw) return logToast('missing recipient or invalid amount', 'err');
      run('stealth_send', { to: to, amount_raw: raw }, amt + ' OCT (stealth)');

    encrypt: function() {
      var amt = document.getElementById('bal-amt').value.trim();
      var raw = octToRaw(amt);
      if (!raw) return logToast('invalid amount', 'err');
      run('encrypt', { amount_raw: raw }, amt + ' OCT → encrypted');

    decrypt: function() {
      var amt = document.getElementById('bal-amt').value.trim();

      run('decrypt', { amount_raw: raw }, amt + ' OCT → public');
    },
    fheEncrypt: async function() {
      var v = document.getElementById('fhe-val').value.trim();
      if (!/^-?[0-9]+$/.test(v)) return logToast('value must be an integer', 'err');
      var r = await run('fhe_encrypt', { value: parseInt(v, 10), reason: 'demo encryption' }, '= ' + v);

    fheDecrypt: function() {
      var ct = document.getElementById('fhe-cipher').value.trim();
      if (!ct) return logToast('paste a ciphertext first', 'err');
      run('fhe_decrypt', { ciphertext: ct, reason: 'demo decryption' }, '…');

    switchNetwork: function(net) {
      run('switch_network', { network: net }, net);
    },
    showTab: function(name) {
      var tabL = document.getElementById('tab-log');
      var tabT = document.getElementById('tab-tx');
      var paneL = document.getElementById('pane-log');
      var paneT = document.getElementById('pane-tx');
      var actCls = ['text-stone-900','bg-stone-50','font-semibold','shadow-[inset_0_-2px_0_theme(colors.stone.900)]'];
      var inaCls = ['text-stone-500','hover:text-stone-900','font-medium'];
      if (name === 'tx') {
        actCls.forEach(function(c){ tabT.classList.add(c); }); inaCls.forEach(function(c){ tabT.classList.remove(c); });
        actCls.forEach(function(c){ tabL.classList.remove(c); }); inaCls.forEach(function(c){ tabL.classList.add(c); });
        paneL.classList.add('hidden'); paneT.classList.remove('hidden');
      } else {
        actCls.forEach(function(c){ tabL.classList.add(c); }); inaCls.forEach(function(c){ tabL.classList.remove(c); });
        actCls.forEach(function(c){ tabT.classList.remove(c); }); inaCls.forEach(function(c){ tabT.classList.add(c); });
        paneL.classList.remove('hidden'); paneT.classList.add('hidden');
      }
    },
    clearActiveTab: function() {
      var txVisible = !document.getElementById('pane-tx').classList.contains('hidden');
      if (txVisible) {
        if (!confirm('Clear local transaction history? (' + txHistory.length + ' entries)')) return;
        txHistory = []; saveTxHistory(); renderTxHistory();
        document.getElementById('tx-count').textContent = '0';
        toast('Transaction history cleared', 'info');
      } else {
        logEl.innerHTML = '';
        var jb = document.getElementById('log-jump');
        jb.setAttribute('data-count', '0'); jb.classList.add('hidden');
      }
    },
    jumpToLatest: function() {
      paneLogEl.scrollTop = paneLogEl.scrollHeight;
      var jb = document.getElementById('log-jump');
      jb.setAttribute('data-count', '0'); jb.classList.add('hidden');
    },
  };
  window.app = app;

  document.getElementById('cfg-webcli').value = WEBCLI;
  log('ready · webcli ' + WEBCLI, 'info');
  if (FILE_ORIGIN_BLOCKED) toast('Serve this page over http:// to use the signer', 'warn');
  refreshStatus();
  setInterval(refreshStatus, 8000);
  window.addEventListener('focus', refreshStatus);
})();
</script>
</body>
</html>
